<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eaglercraft 1.16</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        #gameCanvas {
            display: block;
            width: 854px;
            height: 480px;
            background-color: #000000;
        }
    </style>
</head>
<body>
<canvas id="gameCanvas" width="854" height="480"></canvas>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="wasm-gc-runtime.js"></script>
<script>
    TeaVM.wasmGC.load("eaglercraft.wasm").then(teavm => {
        const main = teavm.instance.exports['main'];
        main.value([]);
    }).catch(e => {
        console.error('Error loading wasm:', e);
    });
</script>
</body>
</html>
