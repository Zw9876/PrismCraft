<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eaglercraft 1.16</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: #ffffff;
            font-family: monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
    </style>
</head>
<body>
<div id="output">Loading Eaglercraft...</div>
<script src="wasm-gc-runtime.js"></script>
<script>
    TeaVM.wasmGC.load("eaglercraft.wasm").then(teavm => {
        const main = teavm.instance.exports['main'];
        main.value([]);
        document.getElementById('output').innerText = 'Eaglercraft 1.16 loaded successfully!';
    }).catch(e => {
        document.getElementById('output').innerText = 'Error: ' + e.message;
        console.error(e);
    });
</script>
</body>
</html>
